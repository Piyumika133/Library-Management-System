# ── Server ──────────────────────────────────
server.port=8080

# ── MySQL (XAMPP) ────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/libraryms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────
app.jwt.secret=LibraryMS$2024$SuperSecretKey$ForJWT$MustBe256BitsLong$PaddingHere!!
app.jwt.expiration-ms=86400000

# ── File Upload ──────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/
app.qr.output-dir=qrcodes/

# ── Mail ─────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
